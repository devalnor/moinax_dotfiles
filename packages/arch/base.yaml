# Arch Linux base packages
# These are installed via pacman/paru

packages:
  core:
    # Shell and terminal
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - starship
    - tmux

    # Core utilities
    - git
    - stow
    - bat
    - eza
    - fd
    - fzf
    - ripgrep
    - television
    - fastfetch
    - tldr
    - btop
    - keychain
    - jq
    - yq
    - rsync
    - unzip
    - fontconfig

    # File management
    - yazi

  desktop:
    # Terminal emulator
    - kitty

    # GTK theme integration for KDE
    - breeze-gtk

    # Desktop app containers
    - distrobox
    - podman

    # Peripherals
    - headsetcontrol

    # GPU monitor
    - nvtop

    # Fonts
    - ttf-firacode-nerd
    - ttf-fira-sans
    - ttf-font-awesome

    # AppImage runtime support
    - fuse2

  aur:
    # AUR-only packages (installed via paru)
    - paru  # Will be installed first if not present
