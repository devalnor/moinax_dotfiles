# Arch Linux base packages
# These are installed via pacman/paru

packages:
  core:
    # Shell and terminal
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - starship
    - tmux

    # Core utilities
    - git
    - stow
    - bat
    - eza
    - fd
    - fzf
    - ripgrep
    - television
    - fastfetch
    - tldr
    - btop
    - jq
    - yq
    - rsync
    - unzip
    - fontconfig

    # File management
    - yazi

  desktop:
    # Terminal emulator
    - kitty

    # GTK theme integration for KDE
    - breeze-gtk

    # SSH askpass — GUI passphrase prompt for ssh/git run without a terminal
    - ksshaskpass

    # Desktop app containers
    - distrobox
    - podman

    # Peripherals
    - headsetcontrol

    # GPU monitor
    - nvtop

    # Fonts
    - ttf-firacode-nerd
    - ttf-fira-sans
    - ttf-font-awesome
    - maplemono-nf  # AUR — primary terminal/UI mono with ligatures

    # Theming
    - catppuccin-cursors-mocha  # AUR — Catppuccin Mocha cursor pack (dark mode)
    - catppuccin-cursors-latte  # AUR — Catppuccin Latte cursor pack (light mode)
    - matugen                   # Material You palette generator from wallpaper

    # AppImage runtime support
    - fuse2

  aur:
    # AUR-only packages (installed via paru)
    - paru  # Will be installed first if not present
