# Arch Linux base packages
# These are installed via pacman/paru

packages:
  core:
    # Shell and terminal
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - starship
    - tmux

    # Core utilities
    - git
    - stow
    - bat
    - eza
    - fd
    - fzf
    - television
    - fastfetch
    - tldr
    - btop
    - keychain
    - jq
    - yq

    # File management
    - yazi

  desktop:
    # Terminal emulator
    - kitty

    # Peripherals
    - headsetcontrol

    # Fonts
    - ttf-firacode-nerd
    - ttf-fira-sans
    - ttf-font-awesome

  aur:
    # AUR-only packages (installed via paru)
    - paru  # Will be installed first if not present
    - appimagelauncher
