# Gaming - Gaming platforms and tools
name: Gaming
description: Gaming platforms and communication (Steam, Discord)
icon: 🎮
environment: desktop

# No specific dotfiles for gaming
dotfiles: []

# No services
services: []

descriptions:
  steam: Valve game distribution platform
  discord: Voice and text chat for gamers
  mangohud: FPS and performance overlay
  gamemode: Game performance optimization daemon
  heroic-games-launcher-bin: Launcher for Epic, GOG, and Amazon Prime games (Arch AUR)
  heroic-games-launcher: Launcher for Epic, GOG, and Amazon Prime games

packages:
  arch:
    - steam
    - discord
    - mangohud  # Optional: FPS overlay
    - gamemode  # Optional: Game performance optimization
    - heroic-games-launcher-bin  # AUR — Epic/GOG/Amazon Prime games

  fedora:
    - steam
    - discord
    - mangohud
    - gamemode

  debian:
    # Requires multiverse + i386 — enabled by setup_gaming_repos
    - steam
    - lutris
    - gamemode
    - mangohud     # Ubuntu 22.04+ (available in universe/multiverse)

  fedora_repos:
    # RPM Fusion required for Steam
    - rpmfusion-free
    - rpmfusion-nonfree
