# Biometric - Fingerprint authentication + Bitwarden with biometric unlock
name: Biometric
description: Fingerprint reader (fprintd) and Bitwarden password manager with biometric unlock
icon: 🫆
environment: desktop

# Hardware-gated: this group is auto-skipped on machines without a fingerprint
# reader. See has_fingerprint_reader() in install/lib/detect.sh and the gating
# in installer.sh main().

# No dotfiles to manage
dotfiles: []

# fprintd.service is socket-activated by D-Bus, no need to enable.
services: []

descriptions:
  fprintd: Fingerprint reader daemon (libfprint)
  fprintd-pam: PAM module for fprintd (Fedora / Debian / Ubuntu)
  bitwarden: Bitwarden password manager desktop app
  bitwarden-flatpak: Bitwarden Desktop via Flathub (Fedora / Debian — no native package)

packages:
  arch:
    - fprintd
    - bitwarden

  fedora:
    - fprintd
    - fprintd-pam
    # bitwarden installed via Flatpak (see custom_install)

  debian:
    - fprintd
    - libpam-fprintd
    # bitwarden installed via Flatpak (see custom_install)

custom_install:
  - name: bitwarden-flatpak
    check: flatpak info com.bitwarden.desktop
    requires: flatpak
    requires_packages:
      fedora: [flatpak]
      debian: [flatpak]
    install: |
      flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      flatpak install --user -y --noninteractive flathub com.bitwarden.desktop
    distro_skip:
      - arch
