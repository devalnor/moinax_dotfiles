# Niri - Scrollable tiling Wayland compositor
name: Niri
description: Niri compositor with Wayland desktop tools (waybar, rofi, swaync)
icon: 📜
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/niri
  - dot_config/waybar
  - dot_config/rofi
  - dot_config/swaync
  - dot_config/swayosd
  - dot_config/wlogout
  - dot_local/share/rofi

# Services to enable
services:
  - bluetooth
  - NetworkManager

descriptions:
  sddm: Display manager (login screen)
  weston: Fallback SDDM greeter compositor (used when kwin_wayland is absent)
  niri: Scrollable tiling Wayland compositor
  xwayland-satellite: XWayland support for Niri
  waybar: Highly customizable status bar
  rofi-wayland: Application launcher (Wayland fork)
  rofi-calc: Calculator plugin for rofi
  kcalc: KDE calculator application
  rofimoji: Emoji picker for rofi
  swaync: Notification center with drawer and DND
  wlogout: Logout menu for Wayland
  cliphist: Clipboard history manager
  wl-clipboard: Wayland clipboard utilities
  wtype: Wayland keyboard input simulator
  swayosd: On-screen display for volume, brightness and caps-lock
  hyprlock: Screen locker
  swayidle: Idle management daemon
  python-pywayland: Python Wayland bindings (idle inhibitor for caffeine mode)
  swaybg: Wallpaper setter for Wayland
  polkit-kde-agent: Polkit authentication agent
  pavucontrol-qt: PulseAudio volume control GUI (Qt)
  blueman: Bluetooth device manager
  bluez-utils: Bluetooth utilities (Arch)
  bluez: Bluetooth protocol stack (Fedora)
  inotify-tools: File system event monitor
  cmatrix: Terminal matrix rain animation
  networkmanager: Network connection manager (Arch)
  NetworkManager: Network connection manager (Fedora)
  network-manager-applet: NetworkManager tray applet
  nm-connection-editor: NetworkManager connection editor
  plasma-nm: KDE network management widget
  xdg-desktop-portal-kde: KDE portal backend (color-scheme, file chooser, etc.)
  xdg-desktop-portal-hyprland: Hyprland portal backend (screenshot, screencast)

packages:
  arch:
    # Display manager (kwin_wayland preferred if present, weston as fallback)
    - sddm
    - weston

    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofi-calc
    - rofimoji
    - kcalc
    # Notifications
    - swaync
    # Logout screen
    - wlogout

    # Clipboard
    - extra/cliphist
    - extra/wl-clipboard
    - wtype

    # Lock screen
    - hyprlock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # Polkit agent
    - polkit-kde-agent

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez-utils

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # Idle inhibitor (caffeine mode)
    - python-pywayland

    # Other Wayland tools
    - inotify-tools
    - cmatrix

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    - xdg-desktop-portal-hyprland

    # Network management
    - networkmanager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm

  fedora:
    # Display manager (kwin_wayland preferred if present, weston as fallback)
    - sddm
    - weston

    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    # rofi-calc is not available in Fedora repos
    - rofimoji
    - kcalc
    # Notifications
    - SwayNotificationCenter
    # Logout screen
    - wlogout

    # Clipboard
    - cliphist
    - wl-clipboard
    - wtype

    # Lock screen
    - hyprlock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # Polkit agent
    - polkit-kde

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # Idle inhibitor (caffeine mode)
    - python3-pywayland

    # Other Wayland tools
    - inotify-tools
    - cmatrix

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    - xdg-desktop-portal-hyprland

    # Network management
    - NetworkManager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm

  debian:
    # niri is not yet packaged for Debian/Ubuntu in official or common PPAs.
    # Install manually from source: https://github.com/YaLTeR/niri
    # The packages below are Wayland companion tools available via apt.
    # (niri itself will be skipped — install it separately after running this installer)

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofi-calc
    - rofimoji
    - kcalc

    # Notifications
    - sway-notification-center

    # Clipboard
    - wl-clipboard

    # Lock screen
    - swaylock         # hyprlock not in apt; swaylock is the apt equivalent

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # Idle inhibitor (caffeine mode)
    - python3-pywayland

    # Other tools
    - inotify-tools
    - cmatrix

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    # xdg-desktop-portal-hyprland may not be in apt — install from source if needed

    # Network management
    # network-manager-gnome provides nm-applet, the only standalone NM tray applet on Debian.
    # plasma-nm on Debian requires full KDE Plasma — not suitable for standalone tiling WM setups.
    - network-manager
    - network-manager-gnome
    - nm-connection-editor

  fedora_copr:
    - erikreider/swayosd  # On-screen display for volume, brightness, caps-lock (upstream maintainer)

  # Note: SwayNotificationCenter is in official Fedora repos — no COPR needed
