# Niri - Scrollable tiling Wayland compositor
name: Niri
description: Niri compositor with Wayland desktop tools (waybar, rofi, mako)
icon: 📜

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/niri
  - dot_config/waybar
  - dot_config/rofi
  - dot_config/mako
  - dot_local/share/rofi

# Services to enable
services:
  - bluetooth
  - NetworkManager

packages:
  arch:
    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofimoji
    # Notifications
    - mako

    # Clipboard
    - extra/cliphist
    - extra/wl-clipboard
    - wtype

    # Lock screen
    - swaylock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # GTK theming
    - nwg-look

    # Polkit agent
    - polkit-kde-agent

    # Audio control
    - pavucontrol
    - blueman
    - bluez-utils

    # Other Wayland tools
    - inotify-tools
    
    # Network management
    - networkmanager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm

  fedora:
    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    # Notifications
    - mako

    # Clipboard
    - cliphist
    - wl-clipboard
    - wtype

    # Lock screen
    - swaylock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # GTK theming
    - nwg-look

    # Polkit agent
    - polkit-kde-agent

    # Audio control
    - pavucontrol
    - blueman
    - bluez

    # Other Wayland tools
    - inotify-tools
    
    # Network management
    - NetworkManager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm
