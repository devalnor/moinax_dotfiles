# Niri - Scrollable tiling Wayland compositor
name: Niri
description: Niri compositor with Wayland desktop tools (waybar, rofi, mako)
icon: 📜
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/niri
  - dot_config/waybar
  - dot_config/rofi
  - dot_config/mako
  - dot_config/wlogout
  - dot_local/share/rofi

# Services to enable
services:
  - bluetooth
  - NetworkManager

descriptions:
  sddm: Display manager (login screen)
  weston: Wayland compositor for SDDM greeter
  niri: Scrollable tiling Wayland compositor
  xwayland-satellite: XWayland support for Niri
  waybar: Highly customizable status bar
  rofi-wayland: Application launcher (Wayland fork)
  rofimoji: Emoji picker for rofi
  mako: Lightweight notification daemon
  wlogout: Logout menu for Wayland
  cliphist: Clipboard history manager
  wl-clipboard: Wayland clipboard utilities
  wtype: Wayland keyboard input simulator
  hyprlock: Screen locker
  swayidle: Idle management daemon
  swaybg: Wallpaper setter for Wayland
  nwg-look: GTK theme configurator
  polkit-kde-agent: Polkit authentication agent
  pavucontrol: PulseAudio volume control GUI
  blueman: Bluetooth device manager
  bluez-utils: Bluetooth utilities (Arch)
  bluez: Bluetooth protocol stack (Fedora)
  inotify-tools: File system event monitor
  cmatrix: Terminal matrix rain animation
  networkmanager: Network connection manager (Arch)
  NetworkManager: Network connection manager (Fedora)
  network-manager-applet: NetworkManager tray applet
  nm-connection-editor: NetworkManager connection editor
  plasma-nm: KDE network management widget

packages:
  arch:
    # Display manager
    - sddm
    - weston

    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofimoji
    # Notifications
    - mako
    # Logout screen
    - wlogout

    # Clipboard
    - extra/cliphist
    - extra/wl-clipboard
    - wtype

    # Lock screen
    - hyprlock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # GTK theming
    - nwg-look

    # Polkit agent
    - polkit-kde-agent

    # Audio control
    - pavucontrol
    - blueman
    - bluez-utils

    # Other Wayland tools
    - inotify-tools
    - cmatrix

    # Network management
    - networkmanager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm

  fedora:
    # Niri core
    - niri
    - xwayland-satellite

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofimoji
    # Notifications
    - mako
    # Logout screen
    - wlogout

    # Clipboard
    - cliphist
    - wl-clipboard
    - wtype

    # Lock screen
    - hyprlock

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # GTK theming
    - nwg-look

    # Polkit agent
    - polkit-kde-agent

    # Audio control
    - pavucontrol
    - blueman
    - bluez

    # Other Wayland tools
    - inotify-tools
    - cmatrix

    # Network management
    - NetworkManager
    - network-manager-applet
    - nm-connection-editor
    - plasma-nm

  debian:
    # niri is not yet packaged for Debian/Ubuntu in official or common PPAs.
    # Install manually from source: https://github.com/YaLTeR/niri
    # The packages below are Wayland companion tools available via apt.
    # (niri itself will be skipped — install it separately after running this installer)

    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofimoji

    # Notifications
    # Note: dotfiles ship mako configs; dunst is installed as apt alternative.
    # Manual config adaptation needed for dunst on Debian/Ubuntu.
    - dunst            # mako not in apt; dunst is the apt equivalent

    # Clipboard
    - wl-clipboard

    # Lock screen
    - swaylock         # hyprlock not in apt; swaylock is the apt equivalent

    # Idle management
    - swayidle

    # Wallpaper
    - swaybg

    # Audio control
    - pavucontrol
    - blueman
    - bluez

    # Other tools
    - inotify-tools
    - cmatrix

    # Network management
    - network-manager
    - network-manager-gnome
    - nm-connection-editor
