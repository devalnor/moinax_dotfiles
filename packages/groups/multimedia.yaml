# Multimedia - Media players and tools
name: Multimedia
description: Media players and multimedia tools (mpv, obs, etc.)
icon: 🎬

# No specific dotfiles for multimedia
dotfiles: []

# No services
services: []

descriptions:
  mpv: Lightweight media player
  obs-studio: Streaming and screen recording
  ffmpeg: Audio/video encoding framework
  imagemagick: Image manipulation toolkit
  ImageMagick: Image manipulation toolkit (Fedora)
  gimp: GNU Image Manipulation Program
  inkscape: Vector graphics editor

packages:
  arch:
    - mpv
    - obs-studio
    - ffmpeg
    - imagemagick
    - gimp
    - inkscape

  fedora:
    - mpv
    - obs-studio
    - ffmpeg
    - ImageMagick
    - gimp
    - inkscape

  debian:
    # Requires restricted + universe — enabled by setup_multimedia_repos
    - vlc
    - obs-studio
    - kdenlive
    - ffmpeg
    - imagemagick
    - gimp
    - inkscape
    - pavucontrol

  fedora_repos:
    # RPM Fusion for codecs
    - rpmfusion-free
    - rpmfusion-nonfree
