# Hyprland - Wayland compositor and related tools
name: Hyprland
description: Hyprland compositor with Wayland tools (waybar, rofi, swaync)
icon: 🪟
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/hypr
  - dot_config/waybar
  - dot_config/rofi
  - dot_config/swaync
  - dot_config/swayosd
  - dot_config/wlogout
  - dot_local/share/rofi

# Services to enable
services:
  - bluetooth

descriptions:
  sddm: Display manager (login screen)
  weston: Fallback SDDM greeter compositor (used when kwin_wayland is absent)
  hyprland: Dynamic tiling Wayland compositor
  hypridle: Idle daemon for Hyprland
  hyprlock: Screen locker for Hyprland
  hyprpaper: Wallpaper manager for Hyprland
  hyprpicker: Color picker for Hyprland
  polkit-kde-agent: Polkit authentication agent (KDE)
  hyprshot: Screenshot tool for Hyprland
  swayosd: On-screen display for volume, brightness and caps-lock
  python-pywayland: Python Wayland bindings (idle inhibitor for caffeine mode)
  waybar: Highly customizable status bar
  rofi-wayland: Application launcher (Wayland fork)
  rofi-calc: Calculator plugin for rofi
  kcalc: KDE calculator application
  rofimoji: Emoji picker for rofi
  swaync: Notification center with drawer and DND
  wlogout: Logout menu for Wayland
  cliphist: Clipboard history manager
  wl-clipboard: Wayland clipboard utilities
  wtype: Wayland keyboard input simulator
  pavucontrol-qt: PulseAudio volume control GUI (Qt)
  blueman: Bluetooth device manager
  bluez-utils: Bluetooth utilities (Arch)
  bluez: Bluetooth protocol stack (Fedora)
  xorg-xhost: X server access control (Arch)
  xhost: X server access control (Fedora)
  inotify-tools: File system event monitor
  cmatrix: Terminal matrix rain animation
  xdg-desktop-portal-kde: KDE portal backend (color-scheme, file chooser, etc.)
  xdg-desktop-portal-hyprland: Hyprland portal backend (screenshot, screencast)

packages:
  arch:
    # Display manager (kwin_wayland preferred if present, weston as fallback)
    - sddm
    - weston

    # Hyprland core
    - hyprland
    - hypridle
    - hyprlock
    - hyprpaper
    - hyprpicker
    - polkit-kde-agent
    - hyprshot
    
    # Status bar and menus
    - waybar
    - rofi-wayland
    - rofi-calc
    - rofimoji
    - kcalc
    # Notifications
    - swaync
    # Logout screen
    - wlogout

    # Clipboard
    - extra/cliphist
    - extra/wl-clipboard
    - wtype

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez-utils

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # X compatibility
    - xorg-xhost
    
    # Idle inhibitor (caffeine mode)
    - python-pywayland

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    - xdg-desktop-portal-hyprland

    # Other Wayland tools
    - inotify-tools
    - cmatrix

  fedora:
    # Display manager (kwin_wayland preferred if present, weston as fallback)
    - sddm
    - weston

    # Hyprland core
    - hyprland
    - hypridle
    - hyprlock
    - hyprpaper
    - hyprpicker
    - polkit-kde
    - hyprshot

    # Status bar and menus
    - waybar
    - rofi-wayland
    # rofi-calc is not available in Fedora repos
    - rofimoji
    - kcalc
    # Notifications
    - SwayNotificationCenter
    # Logout screen
    - wlogout

    # Clipboard
    - cliphist
    - wl-clipboard
    - wtype

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # X compatibility
    - xhost

    # Idle inhibitor (caffeine mode)
    - python3-pywayland

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    - xdg-desktop-portal-hyprland

    # Other tools
    - inotify-tools
    - cmatrix

  debian:
    # Ubuntu 24.04+ recommended (hyprland available in universe)
    # Requires universe repo — enabled by setup_hyprland_repos
    - hyprland
    - hyprpaper
    - hypridle
    - hyprlock

    # Display manager (kwin_wayland preferred if present, weston as fallback)
    - sddm
    - weston

    # Status bar and menus
    - waybar
    # rofi-wayland is the correct Wayland fork on Ubuntu 24.04+.
    # Plain 'rofi' is the X11 build; use rofi-wayland for Wayland support.
    - rofi-wayland
    - rofi-calc
    - rofimoji
    - kcalc

    # Notifications
    - sway-notification-center

    # Clipboard
    - wl-clipboard
    - cliphist

    # Audio control
    - pavucontrol-qt
    - blueman
    - bluez

    # On-screen display (volume, brightness, caps-lock)
    - swayosd

    # X compatibility
    - x11-xserver-utils

    # Idle inhibitor (caffeine mode)
    - python3-pywayland

    # XDG Desktop Portal
    - xdg-desktop-portal-kde
    # xdg-desktop-portal-hyprland may not be in apt — install from source if needed

    # Other tools
    - inotify-tools
    - cmatrix

    # Note: hyprpicker, hyprshot, wlogout, wtype
    # may not be in apt — install via binary or build from source

  fedora_copr:
    - solopasha/hyprland  # For hyprshot (not in official repos)
    - mecattaf/swayosd    # On-screen display for volume, brightness, caps-lock
