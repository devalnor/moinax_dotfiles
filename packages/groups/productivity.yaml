# Productivity - File managers, backup, and productivity tools
name: Productivity
description: File managers, backup tools, and productivity apps
icon: 📁
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/yazi
  - dot_icons
  - dot_themes

# No services
services: []

descriptions:
  dolphin: KDE file manager
  gwenview: KDE image viewer
  kate: KDE text editor
  okular: KDE document viewer (PDF, EPUB, DjVu)
  ffmpegthumbnailer: Video thumbnail generator
  kdegraphics-thumbnailers: Image/PDF thumbnail plugins
  timeshift: System restore / snapshot tool
  timeshift-autosnap: Auto-snapshot before upgrades (Arch)
  grub-btrfs: GRUB entries for Btrfs snapshots (Arch)
  slack-desktop: Team communication app (Arch AUR)
  slack: Team communication app (Fedora)
  google-chrome: Google Chrome web browser (Arch AUR)
  google-chrome-stable: Google Chrome web browser (Fedora)
  p7zip: 7-Zip archive tool
  unrar: RAR archive extractor
  unzip: ZIP archive extractor

packages:
  arch:
    # File managers
    - dolphin
    - ffmpegthumbnailer
    - kdegraphics-thumbnailers

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - timeshift
    - timeshift-autosnap
    - grub-btrfs
    
    # Communication
    - slack-desktop  # AUR
    
    # Web browser
    - google-chrome  # AUR
    
    # Archive tools
    - p7zip
    - unrar
    - unzip

  fedora:
    # File managers
    - dolphin
    - ffmpegthumbnailer
    - kdegraphics-thumbnailers

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - timeshift
    
    # Communication
    - slack
    
    # Web browser
    - google-chrome-stable
    
    # Archive tools
    - p7zip
    - unrar
    - unzip

  debian:
    # File managers
    - dolphin
    - ffmpegthumbnailer

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - timeshift

    # Communication
    # Note: Slack is not available in apt — install manually via .deb from https://slack.com/downloads/linux

    # Web browser (requires Google Chrome repo — added by setup_productivity_repos)
    - google-chrome-stable

    # Archive tools
    - p7zip-full
    - unrar
    - unzip

  fedora_repos:
    # Google Chrome repo
    - google-chrome
