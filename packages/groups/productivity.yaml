# Productivity - File managers, backup, and productivity tools
name: Productivity
description: File managers, backup tools, and productivity apps
icon: 📁
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/yazi
  - dot_icons
  - dot_themes

# No services
services: []

descriptions:
  dolphin: KDE file manager
  gwenview: KDE image viewer
  kate: KDE text editor
  okular: KDE document viewer (PDF, EPUB, DjVu)
  ffmpegthumbnailer: Video thumbnail generator
  kdegraphics-thumbnailers: Image/PDF thumbnail plugins
  snapper: BTRFS snapshot manager
  snap-pac: Auto-snapshot on pacman upgrades (Arch)
  python3-dnf-plugin-snapper: Auto-snapshot on DNF upgrades (Fedora)
  grub-btrfs: GRUB entries for BTRFS snapshots
  slack-desktop: Team communication app (Arch AUR / Debian/Ubuntu)
  slack: Team communication app (Fedora)
  telegram-desktop: Telegram messaging app
  zen-browser-bin: Zen Browser (Arch AUR)
  zen-browser: Zen Browser (Fedora / Debian)
  google-chrome: Google Chrome web browser (Arch AUR)
  google-chrome-stable: Google Chrome web browser (Fedora)
  p7zip: 7-Zip archive tool
  unrar: RAR archive extractor
  unzip: ZIP archive extractor

packages:
  arch:
    # File managers
    - dolphin
    - ffmpegthumbnailer
    - kdegraphics-thumbnailers

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - snapper
    - snap-pac
    - grub-btrfs

    # Communication
    - slack-desktop  # AUR
    - telegram-desktop

    # Web browsers
    - zen-browser-bin  # AUR
    - google-chrome  # AUR

    # Archive tools
    - p7zip
    - unrar
    - unzip

  fedora:
    # File managers
    - dolphin
    - ffmpegthumbnailer
    - kdegraphics-thumbnailers

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - snapper
    - python3-dnf-plugin-snapper
    # grub-btrfs installed from source by setup_btrfs_snapshots()

    # Communication
    - slack
    - telegram-desktop

    # Web browsers
    - zen-browser
    - google-chrome-stable

    # Archive tools
    - p7zip
    - unrar
    - unzip

  debian:
    # File managers
    - dolphin
    - ffmpegthumbnailer

    # KDE apps
    - gwenview
    - kate
    - okular

    # Backup and snapshots
    - snapper
    # grub-btrfs installed from source by setup_btrfs_snapshots()

    # Communication
    - slack-desktop
    - telegram-desktop

    # Web browsers (Google Chrome requires repo — added by setup_productivity_repos)
    - google-chrome-stable

    # Archive tools
    - p7zip-full
    - unrar
    - unzip

  fedora_copr:
    - sneexy/zen-browser

  fedora_repos:
    # Google Chrome repo
    - google-chrome

custom_install:
  - name: zen-browser
    check: zen
    install: |
      curl -fsSL https://github.com/zen-browser/updates-server/raw/refs/heads/main/install.sh | bash
      ln -sf "$HOME/.local/bin/zen" "$HOME/.local/bin/zen-browser"
    distro_skip:
      - arch
      - fedora
