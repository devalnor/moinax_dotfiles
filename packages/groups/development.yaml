# Development - Development tools and environments
name: Development
description: Development tools (docker, neovim, git tools, editors)
icon: 💻

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/nvim
  - dot_config/Cursor
  - dot_config/delta
  - dot_gitconfig

# Services to enable
services:
  - docker
  - tailscaled

descriptions:
  neovim: Hyperextensible text editor
  cursor-bin: AI-powered code editor (Arch AUR)
  git: Distributed version control system
  github-cli: GitHub CLI (Arch)
  gh: GitHub CLI (Fedora)
  lazygit: Terminal UI for git
  git-delta: Syntax-highlighting diff pager
  docker: Container runtime engine
  docker-compose: Multi-container orchestration
  lazydocker: Terminal UI for Docker
  cmake: Cross-platform build system generator
  cpio: Archive copy utility
  base-devel: Base development tools (Arch)
  make: Build automation tool (Fedora)
  gcc: GNU C compiler (Fedora)
  gcc-c++: GNU C++ compiler (Fedora)
  just: Command runner (like make, simpler)
  tailscale: Mesh VPN for secure networking

packages:
  arch:
    # Editors
    - neovim
    - cursor-bin  # AUR
    
    # Git tools
    - git
    - github-cli
    - lazygit
    - git-delta
    
    # Containers
    - docker
    - docker-compose
    - lazydocker
    
    # Build tools
    - cmake
    - cpio
    - base-devel
    
    # Networking
    - tailscale

    # Task runner
    - just

  fedora:
    # Editors
    - neovim
    
    # Git tools
    - git
    - gh
    - lazygit
    - git-delta
    
    # Containers
    - docker
    - docker-compose
    - lazydocker
    
    # Build tools
    - cmake
    - cpio
    - make
    - gcc
    - gcc-c++
    
    # Networking
    - tailscale

    # Task runner
    - just

  fedora_copr:
    - zeno/scrcpy  # For lazydocker if not in main repos
