# Development - Development tools and environments
name: Development
description: Development tools (docker, neovim, git tools, editors)
icon: 💻
environment: both

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/nvim
  - dot_config/Cursor
  - dot_config/delta
  - dot_config/gh-dash
  - dot_config/worktrunk
  - dot_gitconfig

# Services to enable
services:
  - docker
  - tailscaled

descriptions:
  neovim: Hyperextensible text editor
  cursor-bin: AI-powered code editor (Arch AUR)
  git: Distributed version control system
  github-cli: GitHub CLI (Arch)
  gh: GitHub CLI (Fedora)
  lazygit: Terminal UI for git
  git-delta: Syntax-highlighting diff pager
  docker: Container runtime engine
  docker-compose: Multi-container orchestration
  lazydocker: Terminal UI for Docker
  cmake: Cross-platform build system generator
  cpio: Archive copy utility
  base-devel: Base development tools (Arch)
  make: Build automation tool (Fedora)
  gcc: GNU C compiler (Fedora)
  gcc-c++: GNU C++ compiler (Fedora)
  just: Command runner (like make, simpler)
  gh-dash: Terminal UI dashboard for GitHub PRs/issues
  tailscale: Mesh VPN for secure networking
  worktrunk-bin: Git worktree manager for AI workflows (Arch AUR)
  worktrunk: Git worktree manager for AI workflows
  claude-code: AI-powered coding assistant CLI

desktop_only:
  - cursor-bin

# Tools installed via custom commands (not available in package managers).
# These appear in the package selector alongside distro packages.
# Fields: name (display + selection key), check (command to test if installed),
#         install (shell command to run), distro_skip (list of distro families to skip)
custom_install:
  - name: claude-code
    check: claude
    install: curl -fsSL https://claude.ai/install.sh | bash
  - name: gh-dash
    check: gh extension list 2>/dev/null | grep -q dlvhdr/gh-dash
    install: gh extension install dlvhdr/gh-dash
    requires: gh
  - name: worktrunk
    check: wt
    install: curl -fsSL https://github.com/max-sixty/worktrunk/releases/latest/download/worktrunk-installer.sh | sh
    distro_skip:
      - arch

packages:
  arch:
    # Editors
    - neovim
    - cursor-bin  # AUR
    
    # Git tools
    - git
    - github-cli
    - lazygit
    - git-delta
    
    # Containers
    - docker
    - docker-compose
    - lazydocker
    
    # Build tools
    - cmake
    - cpio
    - base-devel
    
    # Networking
    - tailscale

    # Task runner
    - just

    # Worktree management
    - worktrunk-bin  # AUR

  fedora:
    # Editors
    - neovim
    
    # Git tools
    - git
    - gh
    - lazygit
    - git-delta
    
    # Containers
    - docker
    - docker-compose
    - lazydocker
    
    # Build tools
    - cmake
    - cpio
    - make
    - gcc
    - gcc-c++
    
    # Networking
    - tailscale

    # Task runner
    - just

  debian:
    # Editors
    - neovim

    # Git tools
    # Note: git is already in packages/debian/base.yaml
    - gh           # Requires GitHub CLI apt repo (added by setup_development_repos)
    - git-delta

    # Containers (requires Docker CE apt repo — added by setup_development_repos)
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-compose-plugin

    # Build tools
    - build-essential
    - cmake
    - make
    - gcc
    - g++

    # Networking (requires Tailscale apt repo — added by setup_development_repos)
    - tailscale

    # Task runner
    - just

    # Note: lazygit is not in apt — installed via binary (install_lazygit in debian.sh)
    # Note: lazydocker is not in apt — install manually after setup

  fedora_copr:
    - zeno/scrcpy  # For lazydocker if not in main repos
