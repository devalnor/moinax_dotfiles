# AI - AI-powered tools (dictation, assistants, etc.)
name: AI
description: AI-powered desktop tools (voice dictation, assistants)
icon: 🤖
environment: desktop

# Dotfiles to install when this group is selected
dotfiles:
  - dot_config/hyprvoice

descriptions:
  hyprvoice-bin: Speech-to-text dictation tool (Arch AUR)
  whisper.cpp: Local speech recognition engine (Arch)
  whisper-cpp: Local speech recognition engine (Fedora)
  vibewatch: AI agent status bar & overlay for Hyprland/Niri (built from source via cargo)

# Tools installed via custom commands (not available in package managers).
# These appear in the package selector alongside distro packages.
# Fields: name (display + selection key), check (command to test if installed),
#         install (shell command to run), requires (dependency to check), distro_skip (list of distro families to skip)
custom_install:
  - name: vibewatch
    check: command -v vibewatch || test -f "$HOME/.cargo/bin/vibewatch"
    install: curl -fsSL https://raw.githubusercontent.com/Moinax/vibewatch/main/install.sh | sh
    requires: cargo

packages:
  arch:
    # Dictation (speech-to-text)
    - hyprvoice-bin
    - whisper.cpp

  fedora:
    # Dictation (speech-to-text)
    # whisper-cpp ships only libraries on Fedora — whisper-cli is built from source by the installer
    - whisper-cpp
    - sdl2-compat-devel  # Build dependency for whisper-cli audio capture (replaces SDL2-devel in F42+)
    - cmake
    - gcc-c++

  debian:
    # whisper.cpp is not packaged for Debian/Ubuntu.
    # Install via the official install script or build from source:
    #   https://github.com/ggerganov/whisper.cpp
    # hyprvoice is also not in apt — install binary from GitHub releases.
    # Packages listed here are dependencies available in apt:
    - libsdl2-dev      # Runtime dependency for whisper.cpp audio capture
    - ffmpeg           # Audio/video decoding support
