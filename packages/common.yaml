# Common packages - Cross-distro tools installed via curl/git
# These are installed the same way on all distributions

tools:
  - name: zoxide
    description: Smarter cd command
    install: curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh

  - name: fnm
    description: Fast Node.js version manager
    install: curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
    post_install:
      - fnm install --lts
      - npm install -g yarn@1 pnpm

  - name: eza
    description: Modern replacement for ls
    install: |
      arch=$(uname -m); case $arch in aarch64) arch=aarch64;; armv7l) arch=armv7;; esac
      curl -fsSL "https://github.com/eza-community/eza/releases/latest/download/eza_${arch}-unknown-linux-gnu.tar.gz" \
        | sudo tar xz -C /usr/local/bin
      sudo chmod +x /usr/local/bin/eza

  - name: lazydocker
    description: Terminal UI for Docker
    install: curl -fsSL https://raw.githubusercontent.com/jesseduffield/lazydocker/master/scripts/install_update_linux.sh | bash

  - name: television
    description: Terminal fuzzy finder (file picker, history search)
    install: curl -fsSL https://alexpasmantier.github.io/television/install.sh | bash

  - name: tpm
    description: Tmux Plugin Manager
    type: git
    url: https://github.com/tmux-plugins/tpm
    dest: ~/.tmux/plugins/tpm

  - name: hyprvoice
    description: Voice-powered typing for Wayland desktops
    install: |
      curl -sL https://github.com/LeonardoTrapani/hyprvoice/releases/latest/download/hyprvoice-linux-x86_64 -o ~/.local/bin/hyprvoice
      chmod +x ~/.local/bin/hyprvoice

  - name: rofi-themes-collection
    description: Collection of Rofi themes
    type: git
    url: https://github.com/lr-tech/rofi-themes-collection
    dest_temp: /tmp/rofi-themes-collection
    install_cmd: cp -r /tmp/rofi-themes-collection/themes/* ~/.local/share/rofi/themes/
