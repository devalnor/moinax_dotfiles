# Fedora base packages
# These are installed via dnf

packages:
  core:
    # Shell and terminal
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - starship
    - tmux

    # Core utilities
    - git
    - stow
    - bat
    - fd-find
    - fzf
    - fastfetch
    - tealdeer  # tldr implementation for Fedora
    - btop
    - keychain
    - jq
    - yq
    - lazygit
    - unzip
    - fontconfig

    # File management
    - yazi

  desktop:
    # Terminal emulator
    - kitty

    # Desktop app containers
    - distrobox
    - podman

    # Peripherals
    - headsetcontrol

    # AppImage runtime support
    - fuse
    - fuse-libs

    # Fonts
    - fira-code-fonts
    - fontawesome-fonts
    - google-noto-fonts-common

  copr:
    # COPR repositories to enable (processed before package installation)
    # Note: Only include COPRs that exist and support current Fedora version
    repositories:
      - atim/starship      # Starship prompt
      - atim/lazygit       # Git TUI
      - lihaohong/yazi     # Terminal file manager
