# Fedora base packages
# These are installed via dnf

packages:
  core:
    # Shell and terminal
    - zsh
    - zsh-autosuggestions
    - zsh-syntax-highlighting
    - starship
    - tmux

    # Core utilities
    - git
    - stow
    - bat
    - fd-find
    - fzf
    - fastfetch
    - tealdeer  # tldr implementation for Fedora
    - btop
    - keychain
    - jq
    - yq
    - rsync
    - unzip
    - fontconfig

    # File management
    - yazi

  desktop:
    # Terminal emulator
    - kitty

    # Desktop app containers
    - distrobox
    - podman

    # Peripherals
    - headsetcontrol

    # AppImage runtime support
    - fuse
    - fuse-libs

    # Fonts
    - fira-code-fonts
    - fontawesome-fonts
    - google-noto-fonts-common

  # Note: starship, lazygit, and yazi are in official Fedora repos — no COPRs needed
  # Note: eza is not packaged for Fedora — installed via binary in common tools
