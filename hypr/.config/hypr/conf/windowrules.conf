# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# JetBrains
# https://www.jetbrains.com/help/idea/2022.1/configuring-intellij-idea-for-linux.html#ws-intellij-idea-linux-window-rules
windowrule = float, class:(jetbrains-)(.*), title:(.*)
windowrule = noinitialfocus, class:(jetbrains-)(.*), floating:1

# Calculator rules
windowrule = float,class:^org.gnome.Calculator$
windowrule = size 400 600,class:^org.gnome.Calculator$
windowrule = center,class:^org.gnome.Calculator$
# windowrulev2 = noinitialfocus, class:(org.gnome.Calculator), floating:1
