# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

# Actions
bind = SUPER, Q, killactive # Close current window
# bind = SUPER, L, exec, hyprlock # Lock the screen with hyprlock
bind = SUPER, L, exec, wlogout # Lock the screen with hyprlock
bind = SUPER SHIFT, Q, exit # Exit Hyprland

# Reload configs
bind = SUPER SHIFT, B, exec, ~/.config/hypr/scripts/reload-waybar.sh # Reload Waybar
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/reload-hyprpaper.sh # Reload hyprpaper after a changing the wallpaper
bind = SUPER SHIFT, R, exec, hyprctl reload # Reload hyprland

# App shorcuts
bind = SUPER, RETURN, exec, kitty # Open terminal
bind = SUPER, B, exec, google-chrome-stable # Open browser
bind = SUPER, E, exec, Thunar
bind = SUPER, SPACE, exec, rofi -show drun
bind = SUPER SHIFT, SPACE, exec, rofi -show emoji -modi emoji
bind = SUPER, A, exec, ~/.config/hypr/scripts/toggle-audio-switch.sh # Switch audio output device
bind = SUPER, M, exec, ~/.config/hypr/scripts/toggle-monitor-layout.sh # Switch monitor layout 
bind = SUPER, K, exec, ~/.config/hypr/scripts/toggle-keyboard-layout.sh # Switch keyboard layout 

# Screenshots
bind = , PRINT, exec, hyprshot -m output # Screenshot a monitor
bind = SUPER, PRINT, exec, hyprshot -m window # Screenshot a window
bind = SUPER SHIFT, PRINT, exec, hyprshot -m region # Screenshot a region

# Scratchpad (special workspace)
bind = SUPER, S, togglespecialworkspace, # Open the scratchpad
bind = SUPER SHIFT, S, movetoworkspace, special # Move active window to/from special workspace
bind = SUPER CTRL, S, movetoworkspacesilent, special # Move active window to/from special workspace silently

# Window management
bind = SUPER, F, fullscreen # Open the window in fullscreen
bind = SUPER CTRL, F, togglefloating # Toggle between tiling and floating window
bind = SUPER, T, togglefloating # Toggle between tiling and floating window
bind = SUPER, P, pin,
# Groups
bind = SUPER, G, togglegroup,
bind = ALT, TAB, changegroupactive, f
bind = ALT SHIFT, TAB, changegroupactive, b
bind = ALT CTRL, TAB, movegroupwindow, # swap a grouped window with the next one
bind = SUPER, Tab, exec, rofi -show window -window-thumbnail
bind = SUPER SHIFT, Tab, cyclenext, prev
# Toggle between horizontal and vertical split
bind = SUPER, J, togglesplit,

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l # Move focus left
bind = SUPER, right, movefocus, r # Move focus right
bind = SUPER, up, movefocus, u # Move focus up
bind = SUPER, down, movefocus, d # Move focus down

# Resize active window
binde = SUPER SHIFT, right, resizeactive, 10 0
binde = SUPER SHIFT, left, resizeactive, -10 0
binde = SUPER SHIFT, up, resizeactive , 0 -10
binde = SUPER SHIFT, down, resizeactive, 0 10

# Move active window
bind = SUPER ALT, right, swapwindow, r 
bind = SUPER ALT, left, swapwindow, l 
bind = SUPER ALT, up, swapwindow , u 
bind = SUPER ALT, down, swapwindow, d 

# Move active window
bind = SUPER CTRL, right, movewindoworgroup, r 
bind = SUPER CTRL, left, movewindoworgroup, l 
bind = SUPER CTRL, up, movewindoworgroup, u 
bind = SUPER CTRL, down, movewindoworgroup, d 

# Switch workspaces with mainMod + [0-9]
bind = SUPER, ampersand, workspace, 1 # Switch to workspace 1
bind = SUPER, eacute, workspace, 2 # Switch to workspace 2
bind = SUPER, quotedbl, workspace, 3 # Switch to workspace 3
bind = SUPER, apostrophe, workspace, 4 # Switch to workspace 4
bind = SUPER, parenleft, workspace, 5 # Switch to workspace 5
bind = SUPER, minus, workspace, 6 # Switch to workspace 6
bind = SUPER, egrave, workspace, 7 # Switch to workspace 7

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, ampersand, movetoworkspace, 1 #  Move window to workspace 1
bind = SUPER SHIFT, eacute, movetoworkspace, 2 #  Move window to workspace 2
bind = SUPER SHIFT, quotedbl, movetoworkspace, 3 #  Move window to workspace 3
bind = SUPER SHIFT, apostrophe, movetoworkspace, 4 #  Move window to workspace 4
bind = SUPER SHIFT, parenleft, movetoworkspace, 5 #  Move window to workspace 5
bind = SUPER SHIFT, minus, movetoworkspace, 6 #  Move window to workspace 6
bind = SUPER SHIFT, egrave, movetoworkspace, 7 #  Move window to workspace 7

# Move active window to a workspace silently with mainMod + SHIFT + [0-9]
bind = SUPER CTRL, ampersand, movetoworkspacesilent , 1 #  Move window to workspace 1
bind = SUPER CTRL, eacute, movetoworkspacesilent , 2 #  Move window to workspace 2
bind = SUPER CTRL, quotedbl, movetoworkspacesilent , 3 #  Move window to workspace 3
bind = SUPER CTRL, apostrophe, movetoworkspacesilent , 4 #  Move window to workspace 4
bind = SUPER CTRL, parenleft, movetoworkspacesilent , 5 #  Move window to workspace 5
bind = SUPER CTRL, minus, movetoworkspacesilent , 6 #  Move window to workspace 6
bind = SUPER CTRL, egrave, movetoworkspacesilent , 7 #  Move window to workspace 7

# Change the opacity of the current window
bind = SUPER, o, tagwindow, switch_opacity
windowrule = opacity 1 override, tag:switch_opacity

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1 # Scroll workspaces 
bind = SUPER, mouse_up, workspace, e-1 # Scroll workspaces

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow # Move window
bindm = SUPER, mouse:273, resizewindow # Resize window

# Volume control for default sink
# binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh up 5%
# binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh down 5%
# bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume-control.sh mute

