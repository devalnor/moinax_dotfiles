[preferred]
# Use GTK portal as default for Niri (generic, compositor-agnostic)
# Use Hyprland portal for screen sharing (wlroots-based, compatible with Niri)
default=gtk
org.freedesktop.impl.portal.Screenshot=hyprland
org.freedesktop.impl.portal.ScreenCast=hyprland
org.freedesktop.impl.portal.RemoteDesktop=hyprland
