# Point SSH_AUTH_SOCK at the socket the systemd `ssh-agent.socket` user unit
# provisions, so user services and GUI apps -- not just shells -- find the
# agent.
SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket

# GUI passphrase prompt for ssh run without a terminal (e.g. git from an IDE).
# SSH_ASKPASS_REQUIRE is left unset, so terminal git still prompts on the tty.
SSH_ASKPASS=/usr/bin/ksshaskpass
