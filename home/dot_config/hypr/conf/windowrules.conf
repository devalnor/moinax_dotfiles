# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more.
# Pre-0.55 hyprlang grammar: `windowrulev2 = ACTION, FIELD:REGEX`.
# The .lua sibling carries the 0.55+ unified form.

# JetBrains
# https://www.jetbrains.com/help/idea/2022.1/configuring-intellij-idea-for-linux.html#ws-intellij-idea-linux-window-rules
# windowrulev2 = float, class:^(jetbrains-.*)$
# windowrulev2 = nofocus, class:^(jetbrains-.*)$, floating:1

# Calculator rules
windowrulev2 = float, class:^(org\.kde\.kcalc)$
windowrulev2 = size 400 600, class:^(org\.kde\.kcalc)$
windowrulev2 = center, class:^(org\.kde\.kcalc)$
# Btop rules
windowrulev2 = float, class:^(kitty)$, title:^(btop)$
windowrulev2 = size 1280 720, class:^(kitty)$, title:^(btop)$
