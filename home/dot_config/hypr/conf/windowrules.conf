# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# JetBrains
# https://www.jetbrains.com/help/idea/2022.1/configuring-intellij-idea-for-linux.html#ws-intellij-idea-linux-window-rules
windowrulev2 = float, class:(jetbrains-)(.*)
windowrulev2 = noinitialfocus, class:(jetbrains-)(.*), floating:1

# Calculator rules
windowrulev2 = float, class:org.gnome.Calculator
windowrulev2 = size 400 600, class:org.gnome.Calculator
windowrulev2 = center, class:org.gnome.Calculator
# File explorer rules
# windowrulev2 = float, class:org.gnome.Nautilus
# windowrulev2 = size 600 600, class:org.gnome.Nautilus
# windowrulev2 = float, class:Thunar
# windowrulev2 = size 600 600, class:Thunar
# Browser file rules
# windowrulev2 = float, class:xdg-desktop-portal-gtk, title:^All Files$
# Btop rules
windowrulev2 = float, class:kitty, title:btop
windowrulev2 = size 1280 720, class:kitty, title:btop
