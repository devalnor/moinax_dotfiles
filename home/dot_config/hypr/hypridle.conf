general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms("on")'  # to avoid having to press a key twice to turn on the display.
}


listener {
    timeout = 250
    on-timeout = notify-send "Your computer will be locked due to inactivity"
}


listener {
    timeout = 300                                 # 5min
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = 330                                                     # 5.5min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms("off")'                # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms("on")'                  # screen on when activity is detected after timeout has fired.
}

# Auto-suspend disabled 2026-05-19: S3 (deep) suspend is broken on this
# desktop (likely an NVIDIA driver or kernel regression — spent hours
# debugging, no root cause found). Symptom: machine enters S3 but cannot
# wake; only a hard reboot recovers. s2idle on this hardware doesn't really
# suspend (monitors off only), so removing the auto-suspend costs nothing
# versus the existing 5.5min DPMS-off listener. Re-enable once a manual
# `systemctl suspend` (with mem_sleep=deep) wakes cleanly after a kernel
# or nvidia driver bump.
